apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-postgres-pv
  labels:
    app: fintech-postgres
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    # Reemplaza el volumeHandle por tu FileSystemId o FileSystemId::AccessPointId
    volumeHandle: fs-XXXXXXXX
    readOnly: false
