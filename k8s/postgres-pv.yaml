apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-efs-pv
  labels:
    app: fintech-postgres
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    # Reemplaza el volumeHandle por tu FileSystemId o FileSystemId::AccessPointId
    volumeHandle: fs-080c1e93f70158b36
    readOnly: false
