apiVersion: v1
kind: Secret
metadata:
  name: fintech-db-secret
  namespace: fintech
type: Opaque
stringData:
  POSTGRES_USER: fintech_user
  POSTGRES_PASSWORD: <REPLACE_WITH_REAL_PASSWORD>
  POSTGRES_DB: fintech_db
  DB_USER: fintech_user
  DB_PASSWORD: <REPLACE_WITH_REAL_PASSWORD>
  DB_NAME: fintech_db
  APP_ENV: production

# Este archivo es de ejemplo. No contiene credenciales reales.
# Usa k8s/secrets.yaml para el despliegue local y no lo subas al repositorio.
